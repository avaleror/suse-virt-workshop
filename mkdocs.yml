site_name: SUSE Virtualization Workshop
site_description: Self-hosted Virtualization Rodeo — 3-node Harvester HCI + Rancher Prime on bare-metal KVM via rodeo-cli
site_url: https://avaleror.github.io/suse-virt-workshop/
repo_url: https://github.com/avaleror/suse-virt-workshop
repo_name: avaleror/suse-virt-workshop
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: SUSE
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - toc.follow
    - search.suggest
    - search.highlight

extra_css:
  - stylesheets/suse.css

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Chapters:
    - "01: The Arrival": exercises/01-the-arrival.md
    - "02: The Subterranean Divide": exercises/02-subterranean-divide.md
    - "03: The Flash Crash": exercises/03-flash-crash.md
    - "04: The Rising Tide": exercises/04-rising-tide.md
    - "05: The Invisible Intruder": exercises/05-invisible-intruder.md
    - "06: The Unthinkable Error": exercises/06-unthinkable-error.md
    - "07: The Stampede": exercises/07-stampede.md
    - "08: The Final Showdown": exercises/08-final-showdown.md
    - "09: A New Horizon": exercises/09-new-horizon.md
  - Reference:
    - Lab overview: reference/lab-overview.md
    - Quick reference: reference/quick-reference.md
    - Full lab guide (print): lab-guide.md
  - Instructor:
    - Host setup: instructor/host-setup.md
    - Pre-lab checklist: instructor/pre-lab-checklist.md
