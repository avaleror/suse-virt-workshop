# rodeo-plan.yaml — SUSE Virtualization Workshop
# Deploy from this directory:  rodeo up
# Secrets live in ~/.rodeo/secrets.yaml (chmod 600, never committed).
#
# Same topology as the customer-facing suse-virt-rodeo Instruqt lab,
# brought up from scratch on a host you own.

name: suse-virt-workshop

deployment_target: baremetal   # baremetal | instruqt

network:
  mode: nat              # nat | bridge
  vip: "192.168.122.10"   # kube-vip floating IP, must not be a node IP
  rancher_ip: "192.168.122.9"
  gateway: "192.168.122.1"
  dns_domain: "vertextrust.bank"
  # bridge mode only:
  # host_bridge: br0

resources:
  harvester:
    memory_mib: 16384    # 16 GiB, meets Harvester minimum
    vcpu: 8
    # 150 GB persistent partition is a fixed Harvester floor;
    # 320 GB leaves Longhorn ~165 GB of real room
    disk_gb: 320
  rancher:
    memory_mib: 8192
    vcpu: 4
    disk_gb: 60

versions:
  harvester: "1.8.1"
  rancher: "2.14.1"
  k3s: "v1.35.3+k3s1"
  cert_manager: "v1.20.1"

storage:
  image_dir: /var/lib/libvirt/images
  # Optional dedicated data disk (verify with lsblk first):
  # device: /dev/nvme1n1
  # mount_point: /var/lib/libvirt/images
  # fs_type: xfs

libvirt:
  uri: qemu:///system

# Students import Harvester into Rancher in Chapter 1 (The Arrival).
harvester_auto_import: false

credentials:
  # ??placeholders resolve at load time:
  #   ??key                  -> ~/.rodeo/secrets.yaml (rodeo up / init creates it)
  #   ??env:RODEO_PASSWORD   -> environment variable
  #   ??file:/run/secrets/pw -> file contents
  #   ??cmd:pass show rodeo  -> command stdout
  harvester_os_password: "??harvester_os_password"
  harvester_admin_password: "??harvester_admin_password"
  rancher_admin_password: "??rancher_admin_password"
  harvester_token: "??harvester_token"
