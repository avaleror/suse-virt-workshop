# rodeo-plan.yaml: deployment plan for the SUSE Virtualization Workshop
# Run: rodeo init  to (re)generate the secrets this plan references.
# Secrets go in ~/.rodeo/secrets.yaml (chmod 600, never committed).
#
# Harvester nodes install via iPXE (pxe_server phase). NAT mode only for PXE today.

name: suse-virt-workshop

deployment_target: baremetal   # a clean host you own, instruqt is for the internal customer lab

network:
  mode: nat              # nat | bridge
  vip: "192.168.122.10"   # kube-vip floating IP, must not be a node IP
  rancher_ip: "192.168.122.9"
  gateway: "192.168.122.1"
  dns_domain: "aerogrid.com"
  # bridge mode only:
  # host_bridge: br0

resources:
  harvester:
    memory_mib: 16384    # 16 GiB, meets Harvester minimum
    vcpu: 8
    disk_gb: 270         # Longhorn needs room; 270 GB works for nested KVM
  rancher:
    memory_mib: 8192
    vcpu: 4
    disk_gb: 60

versions:
  harvester: "1.8.1"
  rancher: "2.14.1"
  k3s: "v1.35.3+k3s1"
  cert_manager: "v1.20.1"

storage:
  image_dir: /var/lib/libvirt/images

libvirt:
  uri: qemu:///system

harvester_auto_import: false   # you import Harvester into Rancher yourself, as Exercise 1

credentials:
  # ??placeholders are resolved at load time. Supported forms:
  #   ??key                  -> ~/.rodeo/secrets.yaml (rodeo init creates it)
  #   ??env:RODEO_PASSWORD   -> environment variable
  #   ??file:/run/secrets/pw -> file contents (mounted secrets)
  #   ??cmd:pass show rodeo  -> command stdout (pass, op, vault CLI...)
  # If a source returns nothing, deploy fails fast instead of using
  # an empty password.
  harvester_os_password: "??harvester_os_password"
  harvester_admin_password: "??harvester_admin_password"
  rancher_admin_password: "??rancher_admin_password"
  # Cluster join token, random per environment (rodeo init generates it)
  harvester_token: "??harvester_token"
